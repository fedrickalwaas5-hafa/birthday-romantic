<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Surat Undangan Spesial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #4a2518 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        /* Container amplop */
        .envelope-container {
            perspective: 1000px;
            cursor: pointer;
        }

        /* Amplop */
        .envelope {
            width: 350px;
            height: 250px;
            background: #f5e6d3;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .envelope:hover {
            transform: translateY(-5px);
        }

        /* Penutup amplop (segitiga atas) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e8d5bc;
            clip-path: polygon(0% 0%, 50% 60%, 100% 0%);
            border-radius: 12px 12px 0 0;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            z-index: 3;
            cursor: pointer;
        }

        /* Badan amplop (bagian bawah) */
        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: #f5e6d3;
            border-radius: 0 0 12px 12px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
        }

        /* Garis lipatan samping */
        .envelope::before,
        .envelope::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-style: solid;
        }

        .envelope::before {
            left: 0;
            border-width: 0 0 80px 80px;
            border-color: transparent transparent #e0cfb8 transparent;
        }

        .envelope::after {
            right: 0;
            border-width: 0 80px 80px 0;
            border-color: transparent transparent #e0cfb8 transparent;
        }

        /* Stiker hati di amplop */
        .heart-sticker {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            z-index: 2;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        /* Teks "Buka" */
        .open-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #8b5e3c;
            font-weight: 500;
            z-index: 4;
            pointer-events: none;
            white-space: nowrap;
        }

        /* QR Code container (muncul setelah amplop terbuka) */
        .qr-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .qr-container.show {
            opacity: 1;
            visibility: visible;
        }

        .qr-card {
            background: linear-gradient(135deg, #fffaf5, #fff5ec);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid #d4af37;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }

        .qr-container.show .qr-card {
            transform: scale(1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-card h2 {
            font-family: 'Playfair Display', serif;
            color: #8b5e3c;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .qr-card p {
            color: #b8860b;
            margin-bottom: 20px;
            font-style: italic;
        }

        .qr-code-img {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .qr-code-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .link-text {
            margin-top: 20px;
            font-size: 14px;
            color: #8b5e3c;
            word-break: break-all;
            background: rgba(212, 175, 55, 0.1);
            padding: 12px;
            border-radius: 50px;
            font-family: monospace;
        }

        .close-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            color: #1a0f0a;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .close-btn:hover {
            transform: scale(1.05);
        }

        /* Animasi terbuka */
        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
        }

        /* Efek glitter */
        .glitter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.1) 0%, transparent 50%);
            z-index: 999;
        }

        .instruction {
            text-align: center;
            margin-top: 30px;
            color: #d4af37;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div style="text-align: center;">
    <!-- Amplop -->
    <div class="envelope-container">
        <div class="envelope" id="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-body"></div>
            <div class="heart-sticker">💝</div>
            <div class="open-text">✨ Klik untuk buka ✨</div>
        </div>
    </div>
    <div class="instruction">
        Ada surprise untukmu... 💌
    </div>
</div>

<!-- QR Code Modal -->
<div id="qrModal" class="qr-container">
    <div class="qr-card">
        <h2>✨ SURPRISE! ✨</h2>
        <p>Scan QR Code di bawah atau klik link</p>
        <div class="qr-code-img" id="qrCodeDisplay">
            <!-- QR Code akan muncul di sini -->
        </div>
        <div class="link-text" id="linkDisplay">
            https://birthday-romantic.vercel.app
        </div>
        <button class="close-btn" onclick="closeQR()">Tutup</button>
    </div>
</div>

<div class="glitter"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
    // LINK WEBSITE KAMU (GANTI KALAU PERLU)
    const WEBSITE_URL = 'https://birthday-romantic.vercel.app';
    
    let isOpened = false;
    const envelope = document.getElementById('envelope');
    const qrModal = document.getElementById('qrModal');
    
    // Buat QR Code
    function generateQRCode() {
        const qrDiv = document.getElementById('qrCodeDisplay');
        qrDiv.innerHTML = ''; // Clear dulu
        
        // Buat QR Code pake library
        new QRCode(qrDiv, {
            text: WEBSITE_URL,
            width: 200,
            height: 200,
            colorDark: "#8b5e3c",
            colorLight: "#fffaf5",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // Tampilkan link juga
        document.getElementById('linkDisplay').innerHTML = WEBSITE_URL;
    }
    
    // Fungsi buka amplop
    function openEnvelope() {
        if (isOpened) return;
        isOpened = true;
        
        // Tambah class open untuk animasi
        envelope.classList.add('open');
        
        // Play efek suara (opsional, tidak semua browser support)
        try {
            const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
            audio.volume = 0.2;
            audio.play().catch(e => console.log('Suara tidak bisa diputar'));
        } catch(e) {}
        
        // Tunggu animasi selesai, lalu tampilkan QR Code
        setTimeout(() => {
            generateQRCode();
            qrModal.classList.add('show');
        }, 600);
    }
    
    // Event klik amplop
    envelope.addEventListener('click', openEnvelope);
    
    // Fungsi tutup QR modal
    function closeQR() {
        qrModal.classList.remove('show');
    }
    
    // Klik di luar card juga bisa tutup
    qrModal.addEventListener('click', function(e) {
        if (e.target === qrModal) {
            closeQR();
        }
    });
    
    // Generate QR Code awal (sembunyi)
    generateQRCode();
</script>

</body>
</html>
