<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Surat Spesial untuk Kamu ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #4a2518 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
        }

        /* Efek bintang */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#d4af37 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Tulisan "Klik untuk buka" - BESAR & DI ATAS AMPLOP */
        .click-text {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        /* Amplop container */
        .envelope-container {
            perspective: 1000px;
            cursor: pointer;
            margin: 20px auto;
        }

        /* Amplop */
        .envelope {
            width: 320px;
            height: 230px;
            background: #f5e6d3;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
            margin: 0 auto;
        }

        .envelope:hover {
            transform: translateY(-8px);
        }

        /* Penutup amplop (segitiga atas) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e8d5bc;
            clip-path: polygon(0% 0%, 50% 65%, 100% 0%);
            border-radius: 12px 12px 0 0;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            z-index: 3;
            cursor: pointer;
        }

        /* Badan amplop */
        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 68%;
            background: #f5e6d3;
            border-radius: 0 0 12px 12px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
        }

        /* Lipatan samping */
        .envelope::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 70px 70px;
            border-color: transparent transparent #e0cfb8 transparent;
            z-index: 1;
        }

        .envelope::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 70px 70px 0;
            border-color: transparent transparent #e0cfb8 transparent;
            z-index: 1;
        }

        /* Stiker hati */
        .heart-sticker {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            z-index: 2;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        /* QR Modal */
        .qr-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .qr-container.show {
            opacity: 1;
            visibility: visible;
        }

        .qr-card {
            background: linear-gradient(135deg, #fffaf5, #fff5ec);
            border-radius: 40px;
            padding: 30px 25px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }

        .qr-container.show .qr-card {
            transform: scale(1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-card h2 {
            font-family: 'Playfair Display', serif;
            color: #8b5e3c;
            margin-bottom: 8px;
            font-size: 22px;
        }

        .qr-card p {
            color: #b8860b;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .qr-code-img {
            width: 200px;
            height: 200px;
            margin: 15px auto;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .qr-code-img img, .qr-code-img canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .link-text {
            margin-top: 15px;
            font-size: 12px;
            color: #8b5e3c;
            word-break: break-all;
            background: rgba(212, 175, 55, 0.15);
            padding: 10px;
            border-radius: 50px;
            font-family: monospace;
        }

        .close-btn {
            margin-top: 15px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            color: #1a0f0a;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .close-btn:hover {
            transform: scale(1.05);
        }

        /* Animasi terbuka */
        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
        }

        /* Tombol musik */
        .music-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,250,240,0.95);
            border: 1px solid #d4af37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1001;
            transition: all 0.3s;
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        /* Efek kejutan */
        .surprise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .heart-particle {
            position: absolute;
            font-size: 20px;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1.5);
            }
        }

        .instruction {
            margin-top: 25px;
            color: rgba(212, 175, 55, 0.7);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Tulisan BESAR di ATAS amplop -->
    <div class="click-text">
        ✨ Klik untuk buka ✨
    </div>

    <!-- Amplop -->
    <div class="envelope-container">
        <div class="envelope" id="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-body"></div>
            <div class="heart-sticker">💝</div>
        </div>
    </div>
    <div class="instruction">
        Ada surprise untukmu di dalamnya... 💌
    </div>
</div>

<!-- QR Modal -->
<div id="qrModal" class="qr-container">
    <div class="qr-card">
        <h2>✨ SURPRISE! ✨</h2>
        <p>Scan QR Code di bawah atau klik link</p>
        <div id="qrCodeDisplay" class="qr-code-img"></div>
        <div id="linkDisplay" class="link-text">https://birthday-romantic.vercel.app</div>
        <button class="close-btn" onclick="closeQR()">Tutup</button>
    </div>
</div>

<!-- Tombol musik -->
<button id="musicBtn" class="music-btn">🔇</button>

<!-- YouTube Player -->
<div id="youtubePlayer" style="display: none;"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
    // ==================== KONFIGURASI ====================
    // LINK WEBSITE KAMU (GANTI KALAU PERLU)
    const WEBSITE_URL = 'https://birthday-romantic.vercel.app';
    
    // YOUTUBE VIDEO ID (Love Me Harder - Ariana Grande & The Weeknd Remix)
    const YOUTUBE_VIDEO_ID = '1JEy4VkGYmk';
    
    // ==================== VARIABEL ====================
    let isOpened = false;
    let player = null;
    let isMusicPlaying = false;
    
    // ==================== YOUTUBE MUSIC ====================
    function loadYouTubeMusic() {
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('youtubePlayer', {
                height: '0',
                width: '0',
                videoId: YOUTUBE_VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'controls': 0,
                    'playlist': YOUTUBE_VIDEO_ID
                },
                events: {
                    'onReady': function(event) {
                        console.log('✅ YouTube siap!');
                    },
                    'onError': function(event) {
                        console.log('YouTube error, coba klik tombol musik');
                    }
                }
            });
        };
    }
    
    function playMusic() {
        if (player && !isMusicPlaying) {
            player.playVideo();
            isMusicPlaying = true;
            document.getElementById('musicBtn').textContent = '🔊';
        }
    }
    
    function stopMusic() {
        if (player && isMusicPlaying) {
            player.pauseVideo();
            isMusicPlaying = false;
            document.getElementById('musicBtn').textContent = '🔇';
        }
    }
    
    function toggleMusic() {
        if (isMusicPlaying) {
            stopMusic();
        } else {
            playMusic();
        }
    }
    
    // ==================== ANIMASI KEJUTAN (HEART + CONFETTI) ====================
    function showSurprise() {
        // Buat banyak hati bertebaran
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = ['💝', '💖', '💗', '💓', '💕', '✨', '🎁', '💫'][Math.floor(Math.random() * 8)];
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = window.innerHeight / 2 + (Math.random() - 0.5) * 200 + 'px';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.position = 'fixed';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 2000);
            }, i * 50);
        }
        
        // Confetti sederhana
        const colors = ['#d4af37', '#ff6b9d', '#ffb347', '#ff69b4', '#ff1493'];
        for (let i = 0; i < 100; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-20px';
                confetti.style.width = (Math.random() * 8 + 4) + 'px';
                confetti.style.height = (Math.random() * 8 + 4) + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '999';
                document.body.appendChild(confetti);
                
                let posY = -20;
                const fall = setInterval(() => {
                    posY += 5;
                    confetti.style.top = posY + 'px';
                    if (posY > window.innerHeight) {
                        clearInterval(fall);
                        confetti.remove();
                    }
                }, 20);
            }, i * 30);
        }
    }
    
    // ==================== QR CODE ====================
    function generateQRCode() {
        const qrDiv = document.getElementById('qrCodeDisplay');
        qrDiv.innerHTML = '';
        
        new QRCode(qrDiv, {
            text: WEBSITE_URL,
            width: 180,
            height: 180,
            colorDark: "#8b5e3c",
            colorLight: "#fffaf5",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        document.getElementById('linkDisplay').innerHTML = WEBSITE_URL;
    }
    
    // ==================== BUKA AMPLOP ====================
    function openEnvelope() {
        if (isOpened) return;
        isOpened = true;
        
        // Animasi buka amplop
        const envelope = document.getElementById('envelope');
        envelope.classList.add('open');
        
        // Mainkan musik!
        playMusic();
        
        // Tampilkan animasi kejutan
        showSurprise();
        
        // Tunggu animasi selesai, tampilkan QR
        setTimeout(() => {
            generateQRCode();
            document.getElementById('qrModal').classList.add('show');
        }, 600);
    }
    
    // ==================== TUTUP QR ====================
    function closeQR() {
        document.getElementById('qrModal').classList.remove('show');
    }
    
    // ==================== EVENT LISTENER ====================
    document.getElementById('envelope').addEventListener('click', openEnvelope);
    document.getElementById('musicBtn').addEventListener('click', toggleMusic);
    
    // Klik di luar modal bisa tutup
    document.getElementById('qrModal').addEventListener('click', function(e) {
        if (e.target === this) closeQR();
    });
    
    // ==================== INIT ====================
    window.addEventListener('load', function() {
        loadYouTubeMusic();
        generateQRCode(); // Generate awal (sembunyi)
    });
</script>

</body>
</html>
