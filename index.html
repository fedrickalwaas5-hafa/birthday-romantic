    // ============ CONFETTI ============
    const canvas = document.getElementById('confettiCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    function startConfetti() {
        if (animationId) cancelAnimationFrame(animationId);
        particles = [];
        resizeCanvas();
        
        for (let i = 0; i < 300; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 4,
                speedY: Math.random() * 5 + 3,
                speedX: (Math.random() - 0.5) * 2,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 10
            });
        }
        
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let allGone = true;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                if (p.y < canvas.height) {
                    allGone = false;
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
            }
            
            if (!allGone) {
                animationId = requestAnimationFrame(draw);
            } else {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        draw();
        setTimeout(() => {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }, 5000);
    }

    function nextQuestion() {
        saveCurrentAnswer();
        
        if (currentQuestion === 1) {
            document.getElementById('question1').style.display = 'none';
            document.getElementById('question2').style.display = 'block';
            currentQuestion = 2;
            document.querySelector('.progress').innerHTML = 'Pertanyaan 2 dari 3';
            document.getElementById('nextBtn1').disabled = true;
            document.getElementById('charCount').textContent = '0';
            document.getElementById('answer2').addEventListener('input', checkCurrentAnswer);
        } 
        else if (currentQuestion === 2) {
            document.getElementById('question2').style.display = 'none';
            document.getElementById('question3').style.display = 'block';
            currentQuestion = 3;
            document.querySelector('.progress').innerHTML = 'Pertanyaan 3 dari 3';
            document.getElementById('nextBtn1').innerHTML = 'Selesai & Lihat Galeri 💝';
            document.getElementById('nextBtn1').disabled = true;
            document.getElementById('charCount').textContent = '0';
            document.getElementById('answer3').addEventListener('input', checkCurrentAnswer);
        }
        else if (currentQuestion === 3) {
            saveCurrentAnswer();
            // Kirim ke Telegram
            kirimKeTelegram();
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            currentStep = 2;
            renderGallery();
        }
    }
    
    document.getElementById('nextBtn1').addEventListener('click', nextQuestion);
    document.getElementById('answer1').addEventListener('input', checkCurrentAnswer);
    document.getElementById('answer2').addEventListener('input', checkCurrentAnswer);
    document.getElementById('answer3').addEventListener('input', checkCurrentAnswer);
    
    // ============ GALERI 2 FOTO ============
    function renderGallery() {
        const galleryDiv = document.getElementById('gallery');
        galleryDiv.innerHTML = '';
        FOTO_FOTO.forEach((foto, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.style.animation = `fadeInUp 0.6s ease-out ${index * 0.15}s both`;
            card.innerHTML = `
                <img src="${foto.url}" alt="${foto.judul}" loading="eager">
                <p>✨ ${foto.judul} ✨</p>
            `;
            galleryDiv.appendChild(card);
        });
    }
    
    // ============ STEP 2 KE STEP 3 ============
    document.getElementById('nextBtn2').addEventListener('click', function() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        currentStep = 3;
        
        // Efek typing (TANPA jawaban pertanyaan)
        const messageDiv = document.getElementById('messageDisplay');
        messageDiv.innerHTML = '';
        let displayedMessage = '';
        let currentIndex = 0;
        
        if (typingInterval) clearInterval(typingInterval);
        typingInterval = setInterval(() => {
            if (currentIndex < UCAPAN.length) {
                displayedMessage += UCAPAN[currentIndex];
                messageDiv.innerHTML = displayedMessage;
                currentIndex++;
            } else {
                clearInterval(typingInterval);
            }
        }, 45);
        
        startConfetti();
    });
    
    // ============ INIT ============
    window.addEventListener('load', function() {
        resizeCanvas();
        loadYouTubeMusic();
        
        const musicBtn = document.getElementById('musicToggle');
        musicBtn.addEventListener('click', toggleMusic);
    });
</script>
